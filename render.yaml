# Render.com Infrastructure as Code
# Deploy: https://render.com/docs/blueprint-spec
#
# Quick start:
#   1. Push code to GitHub.
#   2. Vào https://dashboard.render.com → New + → Blueprint → chọn repo này.
#   3. Render đọc file này, tạo 2 service tự động.
#   4. Frontend URL: https://nineseven-ffc-web.onrender.com
#      Backend  URL: https://nineseven-ffc-api.onrender.com
#
# Nếu tên trùng (đã có người dùng), đổi `name:` bên dưới — nhớ update
# CORS_ORIGIN của API + PROD_API trong frontend/assets/js/config.js.

services:
  # ─── Backend Node.js + Express + SQLite ──────────────────────
  - type: web
    name: nineseven-ffc-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: node scripts/seed.js && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DB_PATH
        value: ./data/ffc.db
      - key: CORS_ORIGIN
        value: https://nineseven-ffc-web.onrender.com

  # ─── Frontend Static Site (HTML/CSS/JS) ──────────────────────
  - type: web
    name: nineseven-ffc-web
    runtime: static
    plan: free
    region: singapore
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /assets/js/*
        name: Cache-Control
        value: public, max-age=300
    routes:
      - type: rewrite
        source: /
        destination: /index.html
