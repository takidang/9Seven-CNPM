<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hỗ trợ — FFC (Fix Fast Center)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>
  /* Apply saved theme synchronously before paint */
  (function () {
    try {
      if (localStorage.getItem('ffc_theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (_) {}
  })();

  /* Role gate.
     - Admin: must use the dashboard inbox, never the customer view.
     - Logged-in customer: chat lives as a floating widget on every page,
       so send them back to the homepage and auto-open the panel.
     - Anonymous visitors: stay here (full-page chat with identity prompt). */
  (function () {
    try {
      const role = sessionStorage.getItem('ffc_role');
      if (role === 'admin' || sessionStorage.getItem('pa_admin_logged_in') === '1') {
        window.location.replace('dashboard.html#support');
        return;
      }
      if (role === 'customer') {
        window.location.replace('index.html#chat');
        return;
      }
    } catch (_) {}
  })();
</script>
<script src="assets/js/i18n.js"></script>
<link rel="stylesheet" href="assets/css/chat.css" />
<link rel="stylesheet" href="assets/css/notification.css" />
</head>
<body>

<div class="page-bg-mesh" aria-hidden="true"></div>

<div class="app">
  <div class="chat-card">

    <!-- Header -->
    <header class="chat-head">
      <a href="index.html" class="home" title="Về trang chủ" aria-label="Trang chủ">
        <svg viewBox="0 0 24 24"><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      </a>
      <div class="logo">FFC<span class="dot"></span></div>
      <div class="info">
        <div class="title" data-i18n="chat.title">Hỗ trợ FFC</div>
        <div class="status" data-i18n="chat.online">● Kỹ thuật viên đang online</div>
      </div>
      <button class="icon-btn" onclick="toggleTheme()" title="Đổi giao diện">
        <svg id="themeSun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/></svg>
        <svg id="themeMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <!-- Identity strip -->
    <div class="identity-bar" id="identityBar" style="display:none;">
      <span data-i18n="chat.you">Bạn là:</span>
      <span class="you" id="youLabel">—</span>
      <button class="switch-btn" onclick="switchIdentity()" data-i18n="chat.switch">Đổi tài khoản</button>
      <button class="switch-btn" onclick="logout()" style="margin-left:12px; color: var(--red);" data-i18n="chat.logout">Đăng xuất</button>
    </div>

    <!-- Messages or empty state -->
    <div class="msgs" id="msgs"></div>

    <!-- Reply -->
    <form class="reply" onsubmit="event.preventDefault(); send()">
      <input id="replyInput" type="text" autocomplete="off"
             placeholder="Nhập tin nhắn cho kỹ thuật viên..."
             data-i18n-attr="placeholder:chat.placeholder" />
      <button type="submit" title="Gửi">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>
  </div>
</div>

<!-- ============ Identity prompt (first visit / switch account) ============ -->
<div class="prompt-overlay" id="identityPrompt">
  <div class="prompt-card">
    <h2 data-i18n="chat.prompt.title">Chào bạn!</h2>
    <p data-i18n="chat.prompt.sub">Nhập số điện thoại để kết nối với kỹ thuật viên FFC.</p>
    <form onsubmit="event.preventDefault(); confirmIdentity()">
      <input type="text" id="promptName" class="name" placeholder="Họ tên của bạn"
             data-i18n-attr="placeholder:chat.prompt.name_placeholder" />
      <input type="tel" id="promptPhone" placeholder="Số điện thoại (VD: 0901234567)"
             data-i18n-attr="placeholder:chat.prompt.phone_placeholder" required />
      <button type="submit" data-i18n="chat.prompt.submit">Bắt đầu trò chuyện</button>
    </form>
  </div>
</div>

<script src="assets/js/chat.js"></script>
<script src="assets/js/notification.js"></script>
</body>
</html>
