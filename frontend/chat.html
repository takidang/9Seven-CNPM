<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hỗ trợ — FFC (Fix Fast Center)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>
  /* Apply saved theme synchronously before paint */
  (function () {
    try {
      if (localStorage.getItem('ffc_theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (_) {}
  })();

  /* Role gate.
     - Admin: must use the dashboard inbox, never the customer view.
     - Logged-in customer: chat lives as a floating widget on every page,
       so send them back to the homepage and auto-open the panel.
     - Anonymous visitors: stay here (full-page chat with identity prompt). */
  (function () {
    try {
      const role = sessionStorage.getItem('ffc_role');
      if (role === 'admin' || sessionStorage.getItem('pa_admin_logged_in') === '1') {
        window.location.replace('dashboard.html#support');
        return;
      }
      if (role === 'customer') {
        window.location.replace('index.html#chat');
        return;
      }
    } catch (_) {}
  })();
</script>
<script src="assets/js/i18n.js"></script>
<style>
  :root {
    --navy: #1E3A5F;
    --blue: #2563EB;
    --sky:  #3B82F6;
    --sky-light: #60A5FA;
    --cyan-light: #7DD3FC;

    --bg:        #DBEAFE;
    --surface:   rgba(255, 255, 255, 0.92);
    --surface-2: rgba(255, 255, 255, 0.75);
    --border:    rgba(30, 58, 95, 0.12);
    --text:      #0F172A;
    --text-2:    #475569;
    --text-3:    #94A3B8;
    --input-bg:  #ffffff;
    --green:     #16A34A;
    --amber:     #F59E0B;
    --red:       #DC2626;
  }
  html[data-theme="dark"] {
    --bg:        #0B1426;
    --surface:   rgba(22, 32, 50, 0.88);
    --surface-2: rgba(22, 32, 50, 0.65);
    --border:    rgba(148, 163, 184, 0.18);
    --text:      #F1F5F9;
    --text-2:    #CBD5E1;
    --text-3:    #94A3B8;
    --input-bg:  #1E293B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background: transparent;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ============ Floating mesh — same as dashboard / index ============ */
  .page-bg-mesh {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 700px at 12% 18%, rgba(30, 58, 95, 0.55), transparent 60%),
      radial-gradient(ellipse 800px 700px at 88% 28%, rgba(59, 130, 246, 0.60), transparent 60%),
      radial-gradient(ellipse 700px 600px at 50% 72%, rgba(125, 211, 252, 0.55), transparent 60%),
      radial-gradient(ellipse 620px 600px at 92% 88%, rgba(96, 165, 250, 0.55), transparent 60%);
    filter: blur(50px);
    z-index: 0;
    pointer-events: none;
  }
  html[data-theme="dark"] .page-bg-mesh {
    background:
      radial-gradient(ellipse 900px 700px at 12% 18%, rgba(59, 130, 246, 0.35), transparent 60%),
      radial-gradient(ellipse 800px 700px at 88% 28%, rgba(125, 211, 252, 0.28), transparent 60%),
      radial-gradient(ellipse 700px 600px at 50% 72%, rgba(96, 165, 250, 0.30), transparent 60%),
      radial-gradient(ellipse 620px 600px at 92% 88%, rgba(59, 130, 246, 0.32), transparent 60%);
  }

  /* ============ Centered chat shell ============ */
  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .chat-card {
    width: 100%;
    max-width: 720px;
    height: 100%;
    max-height: calc(100vh - 48px);
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(30, 58, 95, 0.12);
  }

  /* Header */
  .chat-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-head .home {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2);
    text-decoration: none;
    transition: all 0.15s;
  }
  .chat-head .home:hover { background: rgba(59, 130, 246, 0.10); color: var(--blue); }
  .chat-head .home svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

  .chat-head .logo {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: 14px;
    box-shadow: 0 4px 14px rgba(37, 99, 235, 0.30);
    position: relative;
  }
  .chat-head .logo .dot {
    position: absolute;
    bottom: -1px; right: -1px;
    width: 11px; height: 11px;
    background: #22C55E;
    border: 2px solid var(--surface);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(34, 197, 94, 0.6);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.65; transform: scale(0.86); }
  }
  .chat-head .info { flex: 1; min-width: 0; }
  .chat-head .info .title { font-size: 15px; font-weight: 700; color: var(--text); }
  .chat-head .info .status { font-size: 12px; color: var(--green); font-weight: 500; }
  html[data-theme="dark"] .chat-head .info .status { color: #4ADE80; }

  .icon-btn {
    width: 36px; height: 36px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--text-2);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .icon-btn:hover { background: rgba(59, 130, 246, 0.10); color: var(--blue); }
  .icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

  /* Identity strip — shows who customer is, change phone */
  .identity-bar {
    padding: 8px 20px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .identity-bar .you { color: var(--text); font-weight: 600; }
  .identity-bar .switch-btn {
    margin-left: auto;
    background: transparent;
    border: none;
    color: var(--blue);
    cursor: pointer;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
  }
  .identity-bar .switch-btn:hover { text-decoration: underline; }

  /* Messages area */
  .msgs {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
    position: relative;
  }
  .msg .at { display: block; font-size: 10px; opacity: 0.6; margin-top: 4px; }
  .msg.customer {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 14px rgba(37, 99, 235, 0.20);
  }
  .msg.admin {
    align-self: flex-start;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.admin::before {
    content: '🔧 KTV FFC';
    display: block;
    font-size: 10px;
    color: var(--blue);
    font-weight: 700;
    margin-bottom: 3px;
  }
  .msg.system {
    align-self: center;
    background: rgba(245, 158, 11, 0.14);
    color: #B45309;
    border: 1px dashed rgba(245, 158, 11, 0.4);
    font-size: 12px;
    font-style: italic;
    max-width: 86%;
    text-align: center;
    padding: 8px 12px;
  }
  html[data-theme="dark"] .msg.system { color: #FCD34D; background: rgba(245, 158, 11, 0.18); }

  /* Empty state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    gap: 12px;
    color: var(--text-2);
  }
  .empty .ic {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(37, 99, 235, 0.30);
  }
  .empty .ic svg { width: 36px; height: 36px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .empty h2 { color: var(--text); font-size: 20px; }
  .empty p { max-width: 380px; font-size: 14px; }
  .empty .suggest {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .empty .suggest button {
    padding: 8px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    color: var(--text);
    transition: all 0.15s;
  }
  .empty .suggest button:hover { background: rgba(59, 130, 246, 0.10); color: var(--blue); border-color: var(--sky); }

  /* Reply box */
  .reply {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    background: var(--surface-2);
  }
  .reply input {
    flex: 1;
    padding: 11px 16px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--input-bg);
    color: var(--text);
    font: inherit;
    font-size: 14px;
    outline: none;
    transition: all 0.15s;
  }
  .reply input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
  .reply button {
    width: 44px; height: 44px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(37, 99, 235, 0.30);
    transition: transform 0.15s;
  }
  .reply button:hover { transform: translateY(-1px); }
  .reply button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .reply button svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.4; }

  /* Identity prompt overlay */
  .prompt-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .prompt-overlay.open { opacity: 1; pointer-events: auto; }
  .prompt-card {
    background: var(--surface);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 24px 64px rgba(15, 23, 42, 0.30);
    text-align: center;
  }
  .prompt-card h2 { color: var(--text); font-size: 20px; margin-bottom: 6px; }
  .prompt-card p { color: var(--text-2); font-size: 14px; margin-bottom: 18px; }
  .prompt-card input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font: inherit;
    font-size: 15px;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    margin-bottom: 8px;
    text-align: center;
  }
  .prompt-card input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
  .prompt-card .name { margin-bottom: 14px; }
  .prompt-card button {
    width: 100%;
    padding: 12px;
    border: none;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: #fff;
    border-radius: 12px;
    font: inherit;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(37, 99, 235, 0.30);
  }

  @media (max-width: 560px) {
    .app { padding: 0; }
    .chat-card { max-width: 100%; max-height: 100vh; border-radius: 0; }
  }
</style>
</head>
<body>

<div class="page-bg-mesh" aria-hidden="true"></div>

<div class="app">
  <div class="chat-card">

    <!-- Header -->
    <header class="chat-head">
      <a href="index.html" class="home" title="Về trang chủ" aria-label="Trang chủ">
        <svg viewBox="0 0 24 24"><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      </a>
      <div class="logo">FFC<span class="dot"></span></div>
      <div class="info">
        <div class="title" data-i18n="chat.title">Hỗ trợ FFC</div>
        <div class="status" data-i18n="chat.online">● Kỹ thuật viên đang online</div>
      </div>
      <button class="icon-btn" onclick="toggleTheme()" title="Đổi giao diện">
        <svg id="themeSun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/></svg>
        <svg id="themeMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <!-- Identity strip -->
    <div class="identity-bar" id="identityBar" style="display:none;">
      <span data-i18n="chat.you">Bạn là:</span>
      <span class="you" id="youLabel">—</span>
      <button class="switch-btn" onclick="switchIdentity()" data-i18n="chat.switch">Đổi tài khoản</button>
      <button class="switch-btn" onclick="logout()" style="margin-left:12px; color: var(--red);" data-i18n="chat.logout">Đăng xuất</button>
    </div>

    <!-- Messages or empty state -->
    <div class="msgs" id="msgs"></div>

    <!-- Reply -->
    <form class="reply" onsubmit="event.preventDefault(); send()">
      <input id="replyInput" type="text" autocomplete="off"
             placeholder="Nhập tin nhắn cho kỹ thuật viên..."
             data-i18n-attr="placeholder:chat.placeholder" />
      <button type="submit" title="Gửi">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>
  </div>
</div>

<!-- ============ Identity prompt (first visit / switch account) ============ -->
<div class="prompt-overlay" id="identityPrompt">
  <div class="prompt-card">
    <h2 data-i18n="chat.prompt.title">Chào bạn!</h2>
    <p data-i18n="chat.prompt.sub">Nhập số điện thoại để kết nối với kỹ thuật viên FFC.</p>
    <form onsubmit="event.preventDefault(); confirmIdentity()">
      <input type="text" id="promptName" class="name" placeholder="Họ tên của bạn"
             data-i18n-attr="placeholder:chat.prompt.name_placeholder" />
      <input type="tel" id="promptPhone" placeholder="Số điện thoại (VD: 0901234567)"
             data-i18n-attr="placeholder:chat.prompt.phone_placeholder" required />
      <button type="submit" data-i18n="chat.prompt.submit">Bắt đầu trò chuyện</button>
    </form>
  </div>
</div>

<script>
  /* ============================================================
     Shared storage with dashboard's admin inbox.
     ============================================================ */
  const CHAT_KEY = 'ffc_chats';
  const ME_KEY   = 'ffc_customer_me'; /* { phone, name } */
  const THEME_KEY = 'ffc_theme';

  const phoneKey = (p) => (p || '').replace(/\s/g, '');

  function loadChats() {
    try { return JSON.parse(localStorage.getItem(CHAT_KEY) || '{}'); }
    catch (_) { return {}; }
  }
  function saveChats(obj) { localStorage.setItem(CHAT_KEY, JSON.stringify(obj)); }
  function loadMe() {
    try { return JSON.parse(sessionStorage.getItem(ME_KEY) || 'null'); }
    catch (_) { return null; }
  }
  function saveMe(me) { sessionStorage.setItem(ME_KEY, JSON.stringify(me)); }
  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ============================================================
     Identity flow — ask phone on first visit, persist in localStorage.
     ============================================================ */
  function showIdentityPrompt() {
    document.getElementById('identityPrompt').classList.add('open');
    setTimeout(() => document.getElementById('promptPhone').focus(), 200);
  }
  function hideIdentityPrompt() {
    document.getElementById('identityPrompt').classList.remove('open');
  }
  function confirmIdentity() {
    const phone = document.getElementById('promptPhone').value.trim();
    const name  = document.getElementById('promptName').value.trim() || 'Khách hàng';
    if (!phone) return;
    saveMe({ phone, name });
    hideIdentityPrompt();
    renderIdentity();
    /* Ensure this customer's thread exists in storage */
    ensureThread();
    render();
  }
  function switchIdentity() {
    showIdentityPrompt();
    const me = loadMe();
    if (me) {
      document.getElementById('promptPhone').value = me.phone;
      document.getElementById('promptName').value  = me.name;
    }
  }
  function renderIdentity() {
    const me = loadMe();
    const bar = document.getElementById('identityBar');
    if (me) {
      document.getElementById('youLabel').textContent = `${me.name} · ${me.phone}`;
      bar.style.display = '';
    } else {
      bar.style.display = 'none';
    }
  }

  function ensureThread() {
    const me = loadMe();
    if (!me) return;
    const all = loadChats();
    const k = phoneKey(me.phone);
    if (!all[k]) {
      all[k] = {
        name: me.name, phone: me.phone,
        messages: [],
        customerUnread: 0, adminUnread: 0, lastAt: ''
      };
      saveChats(all);
    } else if (all[k].name !== me.name) {
      /* Update name if customer changed it */
      all[k].name = me.name;
      saveChats(all);
    }
  }

  /* ============================================================
     Render thread
     ============================================================ */
  function render() {
    const me = loadMe();
    const msgs = document.getElementById('msgs');
    if (!me) {
      msgs.innerHTML = `
        <div class="empty">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
          <h2 data-i18n="chat.welcome.title">Chào mừng đến với FFC</h2>
          <p data-i18n="chat.welcome.sub">Vui lòng nhập thông tin để bắt đầu nhắn với kỹ thuật viên.</p>
        </div>
      `;
      if (window.PA_i18n) PA_i18n.applyTranslations();
      return;
    }
    const all = loadChats();
    const c = all[phoneKey(me.phone)];

    if (!c || !c.messages.length) {
      msgs.innerHTML = `
        <div class="empty">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
          <h2 data-i18n="chat.start.title">Hỏi gì cũng được</h2>
          <p data-i18n="chat.start.sub">Kỹ thuật viên FFC sẽ phản hồi nhanh chóng. Bạn có thể bắt đầu bằng các gợi ý:</p>
          <div class="suggest">
            <button onclick="quickSend(this.textContent)">Khi nào lấy được máy?</button>
            <button onclick="quickSend(this.textContent)">Cho em xem báo giá</button>
            <button onclick="quickSend(this.textContent)">Bảo hành bao lâu?</button>
            <button onclick="quickSend(this.textContent)">Địa chỉ shop ở đâu?</button>
          </div>
        </div>
      `;
      if (window.PA_i18n) PA_i18n.applyTranslations();
      return;
    }

    msgs.innerHTML = c.messages.map(m => {
      const time = (m.at || '').slice(11, 16);
      const cls = m.from;
      const author = m.from === 'system' ? '⚙ Hệ thống: ' : '';
      return `<div class="msg ${cls}">${author ? `<strong>${author}</strong>` : ''}${escapeHtml(m.text)}<span class="at">${time}</span></div>`;
    }).join('');

    msgs.scrollTop = msgs.scrollHeight;

    /* Mark as read on customer side */
    if (c.customerUnread) {
      c.customerUnread = 0;
      all[phoneKey(me.phone)] = c;
      saveChats(all);
    }
  }

  function quickSend(text) {
    document.getElementById('replyInput').value = text;
    send();
  }

  function send() {
    const me = loadMe();
    if (!me) { showIdentityPrompt(); return; }
    const input = document.getElementById('replyInput');
    const text = input.value.trim();
    if (!text) return;

    const all = loadChats();
    const k = phoneKey(me.phone);
    if (!all[k]) {
      all[k] = { name: me.name, phone: me.phone, messages: [], customerUnread: 0, adminUnread: 0, lastAt: '' };
    }
    const now = new Date().toISOString().slice(0, 16);
    all[k].messages.push({ from: 'customer', text, at: now });
    all[k].adminUnread = (all[k].adminUnread || 0) + 1;
    all[k].lastAt = now;
    saveChats(all);

    input.value = '';
    render();

    /* Auto-reply from "bot" after a short delay if no real admin response.
       Demo flavor — in production this would be removed in favor of waiting
       for a real KTV reply. */
    setTimeout(() => maybeAutoReply(k), 1500);
  }

  function maybeAutoReply(k) {
    const all = loadChats();
    const c = all[k];
    if (!c) return;
    const last = c.messages[c.messages.length - 1];
    if (!last || last.from !== 'customer') return; /* already replied */
    const lt = last.text.toLowerCase();
    let reply = null;
    if (/(khi nào|bao giờ|lấy)/.test(lt))
      reply = 'Xin lỗi anh/chị, kỹ thuật viên đang bận. Em sẽ kiểm tra phiếu và phản hồi trong vài phút. Nếu gấp anh/chị gọi 1900-xxxx ạ.';
    else if (/(giá|báo giá|bao nhiêu)/.test(lt))
      reply = 'Báo giá tham khảo: Thay pin iPhone 720k–1.2tr, Thay màn 800k–4.5tr, Vệ sinh laptop 300k. Giá chính xác cần KTV kiểm tra trực tiếp.';
    else if (/(bảo hành|warranty)/.test(lt))
      reply = 'FFC bảo hành: Linh kiện chính hãng 6–12 tháng, linh kiện tương đương 3 tháng, vệ sinh/nâng cấp 1 tháng. Không áp dụng cho vào nước hoặc rơi vỡ.';
    else if (/(địa chỉ|ở đâu|map)/.test(lt))
      reply = 'FFC có chi nhánh tại Q.1 (123 Nguyễn Huệ) và Q.10 (456 Sư Vạn Hạnh). Giờ mở cửa 8h–21h hàng ngày.';

    if (reply) {
      const now = new Date().toISOString().slice(0, 16);
      c.messages.push({ from: 'admin', text: reply, at: now });
      c.customerUnread = (c.customerUnread || 0) + 1;
      c.lastAt = now;
      all[k] = c;
      saveChats(all);
      render();
    }
  }

  /* ============================================================
     Cross-tab sync — admin replies in another tab → update here
     ============================================================ */
  window.addEventListener('storage', (e) => {
    if (e.key === CHAT_KEY) render();
    if (e.key === THEME_KEY) {
      if (e.newValue === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else document.documentElement.removeAttribute('data-theme');
      syncThemeIcons();
    }
  });

  /* ============================================================
     Logout (customer side) — clears identity + role, back to login
     ============================================================ */
  function logout() {
    if (!confirm('Đăng xuất khỏi tài khoản khách hàng?')) return;
    sessionStorage.removeItem('ffc_role');
    sessionStorage.removeItem('ffc_customer_me');
    window.location.href = 'admin.html';
  }

  /* ============================================================
     Theme toggle
     ============================================================ */
  function syncThemeIcons() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    const sun = document.getElementById('themeSun');
    const moon = document.getElementById('themeMoon');
    if (sun)  sun.style.display  = dark ? 'block' : 'none';
    if (moon) moon.style.display = dark ? 'none'  : 'block';
  }
  function toggleTheme() {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    if (next === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    localStorage.setItem(THEME_KEY, next);
    syncThemeIcons();
  }

  /* ============================================================
     Init
     ============================================================ */
  syncThemeIcons();
  const me = loadMe();
  if (!me) {
    showIdentityPrompt();
  } else {
    ensureThread();
  }
  renderIdentity();
  render();
</script>
</body>
</html>
