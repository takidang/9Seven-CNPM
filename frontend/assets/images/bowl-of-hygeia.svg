<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <g fill="none" stroke="#1B3A5C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">

    <!-- Bowl rim (ellipse miệng chén) -->
    <ellipse cx="100" cy="70" rx="60" ry="11"/>

    <!-- Bowl body (thân chén cong) -->
    <path d="M 40 70 C 44 115, 65 150, 100 152 C 135 150, 156 115, 160 70"/>

    <!-- Stem (chân chén) -->
    <path d="M 100 152 L 100 192"/>

    <!-- Base (đế chén) -->
    <path d="M 65 208 Q 100 216 135 208 Q 100 200 65 208 Z"/>

    <!-- Snake body: rắn quấn từ trong chén, vắt qua miệng, thân buông xuống -->
    <path d="M 75 95
             Q 60 80 70 60
             Q 85 45 110 50
             Q 135 58 135 82
             Q 132 102 112 106
             Q 92 110 92 128
             Q 94 144 114 142" stroke-width="6"/>

    <!-- Snake head (đầu rắn) -->
    <path d="M 114 142
             C 124 142 128 134 124 127
             C 120 121 112 123 110 130
             Z" fill="#1B3A5C"/>

    <!-- Eye (mắt rắn) -->
    <circle cx="118" cy="132" r="1.6" fill="#FFFFFF"/>

    <!-- Forked tongue (lưỡi rắn chẻ đôi) -->
    <path d="M 126 134 L 134 137 M 133 131 L 138 132" stroke-width="2"/>

  </g>
</svg>
